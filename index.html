<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TOEIC Golden Master</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <button onclick="showView('study')" id="nav-study" class="active">暗記</button>
        <button onclick="showView('test')" id="nav-test">単語テスト</button>
        <button onclick="showView('list')" id="nav-list">一覧</button>
    </nav>

    <div class="streak-badge" id="streak-display">🔥 継続: 1日</div>

    <div id="study" class="view active">
        <div class="selector-group">
            <select id="study-genre" onchange="resetStudy()">
                <option value="600">600点 助走</option>
                <option value="730">730点 加速</option>
            </select>
        </div>
        <div class="card" onclick="toggleFlip()">
            <div id="study-tag" class="tag">LEVEL</div>
            <div class="audio-btn" onclick="handleSpeak(event, 'study')">🔊</div>
            <div id="study-en" class="en">Word</div>
            <div id="study-jp" class="jp hidden">意味</div>
        </div>
        <div id="study-count">0 / 0</div>
        <div class="btn-group" style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
            <button class="option" style="width:40%; margin:0;" onclick="prevCard()">前へ</button>
            <button class="option" style="width:40%; margin:0; background:#4A90E2; color:white;" onclick="nextCard()">次へ</button>
        </div>
    </div>

    <div id="test" class="view">
        <div id="test-start-screen">
            <div class="card" style="padding: 30px 20px;">
                <h2 style="margin-top:0;">TEST SETTINGS</h2>
                <p class="label" style="text-align:left; font-size:12px; color:#888; margin-left:5%;">LEVEL</p>
                <div class="selector-group">
                    <select id="test-genre">
                        <option value="600">600点 助走</option>
                        <option value="730">730点 加速</option>
                    </select>
                </div>
                <p class="label" style="text-align:left; font-size:12px; color:#888; margin-left:5%;">MODE</p>
                <div class="selector-group">
                    <select id="test-mode">
                        <option value="translation">英単語 → 和訳</option>
                        <option value="listening">リスニング → 和訳</option>
                        <option value="phrase">フレーズ穴埋め (英単語選択)</option>
                    </select>
                </div>
                <button class="option" style="width:90%; background:#4A90E2; color:white; margin-top:20px;" onclick="initTest()">テスト開始</button>
            </div>
        </div>

        <div id="quiz-area" class="hidden">
            <div class="test-progress-container"><div id="test-progress-bar"></div></div>
            <div class="timer-container"><div id="timer-bar"></div></div>
            <div class="card">
                <div id="quiz-tag" class="tag">LEVEL</div>
                <div class="audio-btn" onclick="handleSpeak(event, 'test')">🔊</div>
                <div id="quiz-en" class="en">Question</div>
                <div id="quiz-phrase-jp" class="phrase-jp" style="margin-top:15px; color:#666; font-size:16px;"></div>
            </div>
            <div class="options" id="options"></div>
        </div>

        <div id="test-result" class="hidden">
            <div class="card">
                <h2 id="result-score"></h2>
                <button class="option" style="width:100%;" onclick="showView('test'); location.reload();">戻る</button>
            </div>
        </div>
    </div>

    <div id="list" class="view">
        <div class="selector-group">
            <select id="list-genre" onchange="renderList()">
                <option value="全ジャンル">全ジャンルを表示</option>
                <option value="600">600点 助走</option>
                <option value="730">730点 加速</option>
            </select>
        </div>
        <div class="card" style="padding: 10px; width:95%;">
            <table style="width:100%; border-collapse: collapse; font-size:14px;">
                <thead>
                    <tr style="border-bottom:1px solid #eee;">
                        <th style="padding:10px;">単語</th>
                        <th>意味</th>
                    </tr>
                </thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>
    </div>

    <script src="js/data-600.js"></script>
    <script src="js/data-730.js"></script>
    
    <script src="js/words-loader.js"></script>
    
    <script src="js/app.js"></script>
</body>
</html>
